baseURL = "https://valeriarojas.cl/"
languageCode = "es-CL"
locale = "es-CL"
title = "Valeria Rojas"
enableRobotsTXT = true
summaryLength = 24
disableKinds = ["taxonomy", "term"]

[params]
  description = "Sitio oficial de Valeria Rojas, ceramista. Conoce su práctica artística y explora sus obras en cerámica contemporánea."
  images = ["/uploads/site/retrato-artista-placeholder.webp"]

[permalinks]
  pieces = "/obras/:slug/"
  pages = "/:slug/"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[taxonomies]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.4
