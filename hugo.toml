baseURL = "https://valeriarojas.cl/"
languageCode = "es-CL"
locale = "es-CL"
title = "Valeria Rojas"
enableRobotsTXT = true
summaryLength = 24
disableKinds = ["taxonomy", "term"]

[params]
  description = "Valeria Rojas se inicia en la cerámica en 2024. Conoce su acercamiento a la cultura cerámica y una selección de sus obras."
  images = ["/uploads/site/valeria-rojas-artista.jpeg"]

[permalinks]
  pieces = "/obras/:slug/"
  pages = "/:slug/"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[taxonomies]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.4
