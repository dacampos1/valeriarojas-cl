{{ define "main" }}
<section class="page-hero compact">
  <p class="kicker">{{ .Title }}</p>
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
</section>
<section class="listing">
  {{ range .Pages }}
    <article>
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p>{{ .Description }}</p>
    </article>
  {{ end }}
</section>
{{ end }}
