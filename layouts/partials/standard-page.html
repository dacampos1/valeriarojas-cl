<article class="text-page{{ with .Params.image }} has-image{{ end }}">
  <header class="page-hero split">
    <div>
      <p class="kicker">{{ .Params.kicker | default .Title }}</p>
      <h1>{{ .Params.intro | default .Title }}</h1>
    </div>
    {{ with .Params.image }}<img src="{{ . }}" alt="{{ $.Params.image_alt | default $.Title }}">{{ end }}
  </header>
  <div class="prose">
    {{ with .Params.approach_title }}<h2>{{ . }}</h2>{{ end }}
    {{ .Content }}
  </div>
</article>
