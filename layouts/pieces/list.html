{{ define "main" }}
<section class="page-hero compact">
  <p class="kicker">Cerámica contemporánea</p>
  <h1>{{ .Title }}</h1>
  <p>{{ .Description | default "Selección de obras en cerámica contemporánea." }}</p>
</section>

<section class="piece-grid gallery">
  {{ range .Pages }}
    {{ partial "piece-card.html" . }}
  {{ end }}
</section>
{{ end }}
